# ============================================================================
# Excel Dataset Manager — all-in-one deployment
# ============================================================================
# One file to run the full stack (PostgreSQL + API + MCP bridge + Caddy HTTPS)
# on a server.
#
# ── BEFORE FIRST RUN ────────────────────────────────────────────────────────
# 1. MCP tools config: tools config đã nằm sẵn trong repo
#    (mcp-bridge/tools.edm.md) — không cần làm gì; muốn thêm connector ngoài
#    thì sửa file đó.
#
# 2. Set the REQUIRED secrets below — either export them, or put them in a
#    `.env` file next to this yaml (compose reads it automatically):
#        POSTGRES_PASSWORD   strong DB password
#        JWT_KEY             >= 32 random chars   (openssl rand -hex 32)
#        EDM_ENCRYPTION_KEY  >= 32 random chars   (openssl rand -hex 32)
#        EDM_DOMAIN          your public domain, e.g. data.your-company.com
#        EDM_PUBLIC_URL      https://<EDM_DOMAIN>  (required for MCP OAuth)
#    The API refuses to start if JWT_KEY or EDM_ENCRYPTION_KEY are missing/weak.
#
# ── RUN ─────────────────────────────────────────────────────────────────────
#        docker compose -f allinone.yaml up -d --build
#        docker compose -f allinone.yaml logs -f api      # watch startup/migrations
#
# ── NOTES ───────────────────────────────────────────────────────────────────
# • Caddy auto-provisions HTTPS for a real public EDM_DOMAIN (needs ports 80/443
#   reachable + DNS pointing at this server). For localhost it serves plain HTTP.
# • Only Caddy is exposed to the internet (80/443). Postgres, the API, and the
#   bridge are bound to 127.0.0.1 for debugging only — never public.
# • Connect Claude: add a connector at https://<EDM_DOMAIN>/mcp — Claude runs the
#   OAuth flow, the user logs in and clicks Allow. No token to paste.
# • The API can reach external databases running on THIS host via the hostname
#   `host.docker.internal` (see extra_hosts on the api service).
# • storage volume: đừng tạo storage/query-guide.md trừ khi muốn ĐÈ query guide
#   bản trong code — file đó override toàn bộ guide.
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: edm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-excel_dataset_manager}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bound to localhost only — the API reaches Postgres over the internal
    # network. Remove this ports block entirely to disable host access.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-excel_dataset_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: edm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Lets the API connect to external databases running on the Docker host
    # (use host `host.docker.internal` in the connection config).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-excel_dataset_manager};Username=${POSTGRES_USER:-app};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"

      # ── Required secrets ──────────────────────────────────────────────────
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required (>= 32 random chars)}
      Encryption__MasterKey: ${EDM_ENCRYPTION_KEY:?EDM_ENCRYPTION_KEY is required (>= 32 random chars)}
      # Public URL — OAuth issuer + resource metadata. MUST be https in production.
      Oauth__PublicUrl: ${EDM_PUBLIC_URL:-http://localhost}

      Jwt__Issuer: ${JWT_ISSUER:-ExcelDatasetManager}
      Jwt__Audience: ${JWT_AUDIENCE:-ExcelDatasetManagerFrontend}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:-*}

      # Rate-limit per real client IP/user (behind Caddy).
      Proxy__TrustForwardedHeaders: "true"

      # ── Uploads / file query ──────────────────────────────────────────────
      Upload__MaxFileSizeMb: ${MAX_UPLOAD_MB:-100}
      Query__DefaultLimit: ${QUERY_DEFAULT_LIMIT:-100}
      Query__HardMaxRows: ${QUERY_HARD_MAX_ROWS:-1000}
      Query__TimeoutSeconds: ${QUERY_TIMEOUT_SECONDS:-30}
      Query__MemoryLimit: ${QUERY_MEMORY_LIMIT:-1GB}
      Query__MaxDatasetsPerQuery: ${QUERY_MAX_DATASETS_PER_QUERY:-3}
      Query__SafeMaxTokens: ${QUERY_SAFE_MAX_TOKENS:-32000}
      Query__HardMaxTokens: ${QUERY_HARD_MAX_TOKENS:-512000}

      # ── External live databases ──────────────────────────────────────────
      ExternalQuery__TimeoutSeconds: ${EXTERNAL_QUERY_TIMEOUT_SECONDS:-30}
      ExternalQuery__MaxConcurrentPerConnection: ${EXTERNAL_MAX_CONCURRENT:-3}
      ExternalQuery__MaxTablesPerDataset: ${EXTERNAL_MAX_TABLES:-50}

      # ── Dashboards ───────────────────────────────────────────────────────
      Dashboard__MaxRowsPerWidget: ${DASHBOARD_MAX_ROWS_PER_WIDGET:-5000}
    ports:
      - "127.0.0.1:${API_PORT:-5847}:8080"
    volumes:
      - storage_data:/app/storage

  bridge:
    build:
      context: ./mcp-bridge
      dockerfile: Dockerfile
    container_name: edm-mcp-bridge
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      MCP_CONFIG: /app/tools.md
      MCP_HOST: 0.0.0.0
      MCP_PORT: 5848
      MCP_RATE_LIMIT_PER_MINUTE: ${MCP_RATE_LIMIT_PER_MINUTE:-180}
      EDM_API_URL: http://api:8080
      # Used in the 401 WWW-Authenticate header so Claude discovers OAuth.
      EDM_PUBLIC_URL: ${EDM_PUBLIC_URL:-http://localhost}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-*}
    ports:
      - "127.0.0.1:${MCP_PORT:-5848}:5848"
    volumes:
      # tools.edm.md is the committed production tools config (see header) —
      # mounted straight from the repo; the bridge hot-reloads it on change.
      - ./mcp-bridge/tools.edm.md:/app/tools.md:ro

  caddy:
    image: caddy:2-alpine
    container_name: edm-caddy
    restart: unless-stopped
    depends_on:
      - api
      - bridge
    environment:
      EDM_DOMAIN: ${EDM_DOMAIN:-localhost}
    # The only internet-facing service. Routes /mcp* → bridge, everything else → api.
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  storage_data:
  caddy_data:
  caddy_config:
